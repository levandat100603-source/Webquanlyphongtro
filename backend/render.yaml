services:
  - type: web
    name: bigsix-backend
    env: php
    plan: free
    buildCommand: composer install && php artisan migrate --force && php artisan cache:clear && php artisan config:clear
    startCommand: bash -lc "php artisan queue:work --sleep=3 --tries=1 --timeout=90 > storage/logs/queue-worker.log 2>&1 & exec php artisan serve --host=0.0.0.0 --port=$PORT"
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: BigSix
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://webquanlyphongtro.onrender.com
      - key: APP_KEY
        value: base64:Xg0Ez3H3Pi+ry5t5/J51cJUe/MnqB7OCMNPPQneDmBk=
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: notice
      - key: SANCTUM_STATEFUL_DOMAINS
        value: https://webquanlyphongtro-nhom3.vercel.app,webquanlyphongtro-nhom3.vercel.app
      - key: SESSION_DOMAIN
        value: .onrender.com
      - key: FRONTEND_URL
        value: https://webquanlyphongtro-nhom3.vercel.app
      - key: BROADCAST_DRIVER
        value: log
      - key: CACHE_DRIVER
        value: file
      - key: FILESYSTEM_DRIVER
        value: local
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_LIFETIME
        value: 120
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: mysql
      # Database variables should be added in Render dashboard with your actual credentials
      # DB_HOST, DB_PORT, DB_DATABASE, DB_USERNAME, DB_PASSWORD
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: BigSix
      - key: CLOUDINARY_CLOUD_NAME
        fromService:
          name: cloudinary
          property: CLOUDINARY_CLOUD_NAME
      - key: CLOUDINARY_API_KEY
        fromService:
          name: cloudinary
          property: CLOUDINARY_API_KEY
      - key: CLOUDINARY_API_SECRET
        fromService:
          name: cloudinary
          property: CLOUDINARY_API_SECRET
      - key: CLOUDINARY_FOLDER
        value: bigsix/rooms

  - type: pserv
    name: bigsix-database
    env: mysql
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all
